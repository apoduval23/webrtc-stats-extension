<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Stats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo-container">
          <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z" fill="currentColor"/>
          </svg>
          <h1>WebRTC Stats</h1>
        </div>
        <div class="status-indicator">
          <div class="pulse-dot active"></div>
          <span>Active</span>
        </div>
      </header>

      <main>
        <div class="stats-card">
          <div class="stats-header">
            <h2>Active Connections</h2>
            <span class="badge">0</span>
          </div>
          <div class="stats-body">
            <p class="empty-state">No active WebRTC connections detected on this page.</p>
          </div>
        </div>

        <div class="action-panel">
          <button id="analyze-btn" class="primary-btn">Analyze Network</button>
        </div>
      </main>
      
      <footer>
        <p>Listening for RTCPeerConnections...</p>
      </footer>
    </div>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
