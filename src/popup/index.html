<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Stats</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="title-area">
          <div class="health-dot" id="health-dot"></div>
          <h1>WebRTC Stats Monitor</h1>
        </div>
      </header>

      <main id="stats-container" style="display: none;">
        <div class="section">
          <h2>Video</h2>
          <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Bitrate</span><span class="stat-value" id="vid-bitrate">-</span></div>
            <div class="stat-item"><span class="stat-label">FPS</span><span class="stat-value" id="vid-fps">-</span></div>
            <div class="stat-item"><span class="stat-label">Resolution</span><span class="stat-value" id="vid-res">-</span></div>
          </div>
        </div>

        <div class="section">
          <h2>Network</h2>
          <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">Loss</span><span class="stat-value" id="net-loss">-</span></div>
            <div class="stat-item"><span class="stat-label">RTT</span><span class="stat-value" id="net-rtt">-</span></div>
            <div class="stat-item"><span class="stat-label">Jitter</span><span class="stat-value" id="net-jitter">-</span></div>
          </div>
        </div>

        <div class="section">
          <h2>Connection</h2>
          <div class="stat-grid">
            <div class="stat-item"><span class="stat-label">State</span><span class="stat-value" id="conn-state">-</span></div>
            <div class="stat-item"><span class="stat-label">ICE Type</span><span class="stat-value" id="conn-type">-</span></div>
          </div>
        </div>

        <div id="insight-box">Waiting for data...</div>
      </main>
      
      <div id="no-data-msg">
        No active WebRTC connection found on this tab.
      </div>

    <button id="toggle-overlay-btn" class="toggle-btn">Toggle Overlay on Page</button>
  </div>
    <script type="module" src="index.ts"></script>
  </body>
</html>
